<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- iOS Native App Capable & Translucent Status Bar -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PRECI FORM" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23008FD5'/><text x='50%' y='68%' font-size='60' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>P</text></svg>" />
    
    <!-- iOS Startup Splash Screen matching premium #0B1F33 executive dark theme -->
    <link rel="apple-touch-startup-image" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='1024' height='1024' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230B1F33'/><circle cx='50' cy='48' r='14' fill='%23008FD5'/><text x='50' y='53.5' font-size='15' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>P</text></svg>" />
    
    <!-- Web Manifest for standalone PWA installation -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Primary SEO Metadata -->
    <title>PRECI FORM - Executive Scheduling Coordination Gateway</title>
    <meta name="description" content="Secure intake, real-time availability checking, and instant Google Calendar/Gmail meeting coordination for Precision Engineering Group." />
    <meta name="keywords" content="executive scheduling, scheduling assistant, Precision Engineering, booking portal, client alignment" />
    <meta name="author" content="Precision Engineering Group" />
    
    <!-- Stylized Vector SVG Dynamic Favicon (Issue #30) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23008FD5'/><text x='50%' y='68%' font-size='60' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>P</text></svg>" />
    
    <!-- Open Graph / Social Sharing Metadata -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PRECI FORM - Executive Coordination Office" />
    <meta property="og:description" content="Securely coordinate alignments, verify slot availabilities, and sync calendar invites directly." />
    <meta property="og:site_name" content="PRECI FORM" />
    
    <!-- Twitter Social Cards -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="PRECI FORM - Executive Coordination Office" />
    <meta property="twitter:description" content="Securely coordinate alignments, verify slot availabilities, and sync calendar invites directly." />

    <!-- Google Font Imports & Typography System -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
